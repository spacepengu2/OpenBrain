name: Firebase Deployment & Validation
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Validate Authentication
        run: |
          RESPONSE=$(curl -s -X POST "https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${{ secrets.FIREBASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"email":"testuser1@openbrain-test.com", "password":"OpenBrainTest456!", "returnSecureToken":true}')
          
          # Check if authentication was successful
          if echo "$RESPONSE" | grep -q "idToken"; then
            echo "Authentication successful"
          else
            echo "Authentication failed: $RESPONSE"
            exit 1
          fi
      
      - name: Install Firebase Tools
        run: npm install -g firebase-tools
      
      - name: Deploy Firebase resources
        run: |
          # Deploy hosting first
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project openbrain-mvp
          
          # Then deploy Firestore rules
          firebase deploy --only firestore:rules --token "${{ secrets.FIREBASE_TOKEN }}" --project openbrain-mvp
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: Verify deployment
        run: |
          # Wait briefly for deployment to propagate
          sleep 10
          
          # Check if site is accessible
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://openbrain-mvp.web.app)
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Deployment verified successfully! Site is accessible."
          else
            echo "Deployment verification failed. HTTP status: $HTTP_STATUS"
            exit 1
          fi