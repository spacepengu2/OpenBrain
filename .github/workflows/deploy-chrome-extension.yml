# GitHub Action: Auto-deploy to TestFlight/Chrome Web Store  
name: Deploy  
on:  
  workflow_dispatch:  
jobs:  
  deploy:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v4  
      - run: npm run build  
      - uses: chromaui/action@v1  
        with:  
          clientId: ${{ secrets.CWS_CLIENT_ID }}  